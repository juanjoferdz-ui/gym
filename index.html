<title>Mi Entrenamiento · Full Body 4 días</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-card: #161616;
    --bg-card-hover: #1c1c1c;
    --border: #262626;
    --border-strong: #333;
    --text: #f5f5f0;
    --text-dim: #a3a3a3;
    --text-mute: #666;
    --accent: #d4ff3d;
    --accent-dim: #94b82e;
    --done: #22c55e;
    --done-bg: rgba(34, 197, 94, 0.08);
    --warn: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html {
    background: #050505;
  }

  html, body {
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    min-height: 100vh;
    min-height: 100dvh;
  }

  body {
    background: #050505;
    margin: 0 auto;
    max-width: 460px;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
  }

  /* App container - everything lives inside this */
  .app {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212, 255, 61, 0.08), transparent),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212, 255, 61, 0.04), transparent);
    background-attachment: fixed;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: calc(110px + env(safe-area-inset-bottom));
    padding-top: env(safe-area-inset-top);
    position: relative;
  }

  /* Desktop: show as phone mockup */
  @media (min-width: 500px) {
    html { background: #000; }
    body {
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 30px 80px rgba(0,0,0,0.6);
      border-radius: 28px;
      overflow: hidden;
      margin-top: 24px;
      margin-bottom: 24px;
      min-height: calc(100vh - 48px);
    }
    .app {
      border-radius: 28px;
      min-height: calc(100vh - 48px);
    }
  }

  /* HEADER */
  .header {
    padding: calc(24px + env(safe-area-inset-top)) 20px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 10, 10, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .title-block h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 0.95;
    letter-spacing: 1px;
    color: var(--text);
  }

  .title-block .subtitle {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-mute);
    margin-top: 4px;
    font-weight: 500;
  }

  .week-counter {
    text-align: right;
  }

  .week-counter .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-mute);
    font-weight: 600;
  }

  .week-counter .number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--bg-card);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px 4px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    min-width: 0;
  }

  .tab.active {
    background: var(--accent);
    color: #0a0a0a;
  }

  .day-label-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    display: block;
    line-height: 1;
    letter-spacing: 0.5px;
  }

  .tab .day-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }

  .evo-tab.active {
    background: #2a2a25;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .tab .progress-dot {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--done);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .tab.complete .progress-dot { opacity: 1; }

  /* PROGRESS */
  .progress-container {
    padding: 18px 20px 6px;
  }

  .progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--bg-card);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
    min-width: 40px;
    text-align: right;
  }

  /* DAY CONTENT */
  .day-content {
    padding: 16px 16px 24px;
    display: none;
    animation: fadeIn 0.25s ease;
  }

  .day-content.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .day-focus {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-mute);
    font-weight: 500;
    margin-bottom: 18px;
  }

  /* EXERCISE CARD */
  .exercise {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: all 0.25s ease;
  }

  .exercise.done {
    background: var(--done-bg);
    border-color: rgba(34, 197, 94, 0.3);
  }

  .exercise.priority {
    border-left: 3px solid var(--accent);
    box-shadow: -3px 0 12px rgba(212, 255, 61, 0.08);
  }

  .priority-star {
    display: inline-block;
    color: #0a0a0a;
    background: var(--accent);
    font-size: 9px;
    margin-right: 6px;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 1px;
    font-weight: 700;
    vertical-align: 2px;
  }

  .exercise-main {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }

  .exercise-img {
    flex-shrink: 0;
    width: 72px;
    height: 72px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1f1f1a, #28281f);
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thumb-emoji {
    font-size: 36px;
    line-height: 1;
  }

  .exercise-info {
    flex: 1;
    min-width: 0;
  }

  .exercise-name {

const STORAGE_KEY = 'gw_workout_v2';

const checkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
const expandIcon = `<svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;

let state = loadState();
let currentDay = 1;

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const s = JSON.parse(saved);
      if (!s.weights) s.weights = {};
      if (!s.bodyComp) s.bodyComp = {};
      if (!s.exerciseImages) s.exerciseImages = {};
      // Migrate old number values to {weight: number} format
      for (const exId in s.weights) {
        for (const week in s.weights[exId]) {
          const v = s.weights[exId][week];
          if (typeof v === 'number') {
            s.weights[exId][week] = { weight: v };
          }
        }
      }
      return s;
    }
  } catch(e) {}
  return { week: 1, completed: {}, lastCelebrated: {}, weights: {}, bodyComp: {}, exerciseImages: {} };
}

function getPrimaryMetric(ex) {
  return (ex.tracks && ex.tracks[0]) || { key: 'weight', label: 'Peso', unit: 'kg', step: 0.5 };
}

function findExercise(exId) {
  for (const day of Object.values(WORKOUT)) {
    const ex = day.exercises.find(e => e.id === exId);
    if (ex) return ex;
  }
  return null;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function render() {
  const isBody = currentDay === 'body';
  const isEvo = currentDay === 'evo';
  const isSecondary = isBody || isEvo;
  document.querySelector('.progress-container').style.display = isSecondary ? 'none' : '';
  document.getElementById('resetDayBtn').style.display = isSecondary ? 'none' : '';

  if (isBody) {
    renderBodyView();
    document.getElementById('weekNum').textContent = state.week;
    return;
  }

  if (isEvo) {
    renderEvolutionView();
    document.getElementById('weekNum').textContent = state.week;
    return;
  }

  const content = document.getElementById('content');
  content.innerHTML = '';

  const day = WORKOUT[currentDay];
  const wrapper = document.createElement('div');
  wrapper.className = 'day-content active';

  wrapper.innerHTML = `
    <div class="day-title">${day.title}</div>
    <div class="day-focus">${day.focus}</div>
  `;

  day.exercises.forEach(ex => {
    const isDone = !!state.completed[ex.id];
    const exWeights = state.weights[ex.id] || {};
    const tracks = ex.tracks || [{ key: 'weight', label: 'Peso', unit: 'kg', step: 0.5 }];
    const isMulti = tracks.length > 1;
    const currentEntry = exWeights[state.week] || {};
    const prev = getPreviousWeight(ex.id);
    const prevHtml = prev ? `<span class="prev-weight" title="Última vez: semana ${prev.week}">ant ${prev.value}${prev.unit}</span>` : '';
    const priorityClass = ex.priority ? ' priority' : '';
    const priorityStar = ex.priority ? '<span class="priority-star">TOP</span>' : '';

    const inputsHtml = tracks.map(t => {
      const v = currentEntry[t.key] != null ? currentEntry[t.key] : '';
      return `
        <label class="weight-input-wrap${isMulti ? ' multi' : ''}" onclick="event.stopPropagation()">
          <input class="weight-input" type="number" inputmode="decimal" step="${t.step}" min="0" placeholder="—" value="${v}" data-id="${ex.id}" data-metric-key="${t.key}">
          <span class="weight-unit">${t.unit}</span>
        </label>
      `;
    }).join('');

    const card = document.createElement('div');
    card.className = 'exercise' + (isDone ? ' done' : '') + priorityClass;
    card.dataset.id = ex.id;

    card.innerHTML = `
      <div class="exercise-main">
        <div class="exercise-info">
          <div class="exercise-name">${priorityStar}${ex.name}</div>
          <div class="exercise-stats${isMulti ? ' multi' : ''}">
            <span class="stat">${ex.sets} × ${ex.reps}</span>
            ${inputsHtml}
            ${prevHtml}
          </div>
        </div>
        ${expandIcon}
        <button class="check-btn" aria-label="Marcar completado">${checkIcon}</button>
      </div>
      <div class="exercise-technique">
        <div class="expanded-image-wrap">
          ${renderExpandedImage(ex)}
        </div>
        <div class="technique-content">${ex.tech}</div>
        <div class="weight-history">
          ${renderWeightHistory(ex.id)}
        </div>
      </div>
    `;

    const main = card.querySelector('.exercise-main');
    const checkBtn = card.querySelector('.check-btn');
    const weightInputs = card.querySelectorAll('.weight-input');

    main.addEventListener('click', (e) => {
      if (e.target.closest('.check-btn')) return;
      if (e.target.closest('.weight-input-wrap')) return;
      card.classList.toggle('expanded');
    });

    checkBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDone(ex.id);
    });

    weightInputs.forEach(input => {
      input.addEventListener('click', (e) => e.stopPropagation());
      input.addEventListener('change', (e) => {
        saveWeight(ex.id, e.target.value, e.target.dataset.metricKey);
      });
      input.addEventListener('blur', (e) => {
        saveWeight(ex.id, e.target.value, e.target.dataset.metricKey);
      });
    });

    attachImageHandlers(card);

    wrapper.appendChild(card);
  });

  content.appendChild(wrapper);
  updateProgress();
  updateTabDots();
  document.getElementById('weekNum').textContent = state.week;
}

function getPreviousWeight(exId) {
  const ex = findExercise(exId);
  if (!ex) return null;
  const metric = getPrimaryMetric(ex);
  const exData = state.weights[exId] || {};
  const weeks = Object.keys(exData).map(Number).filter(w => w !== state.week).sort((a,b) => b - a);
  for (const w of weeks) {
    const entry = exData[w];
    if (entry && entry[metric.key] != null) {
      return { week: w, value: entry[metric.key], unit: metric.unit };
    }
  }
  return null;
}

function renderWeightHistory(exId) {
  const ex = findExercise(exId);
  if (!ex) return '';
  const metric = getPrimaryMetric(ex);
  const exData = state.weights[exId] || {};
  const weeks = Object.keys(exData).map(Number).sort((a,b) => a - b);
  const points = weeks
    .map(w => ({ week: w, value: exData[w]?.[metric.key] }))
    .filter(p => p.value != null);

  if (points.length === 0) {
    return `
      <div class="weight-history-header">
        <span class="weight-history-label">Evolución</span>
      </div>
      <div class="weight-empty">Aún no has registrado ${metric.label.toLowerCase()}. Mete tu valor de hoy en el cuadro de arriba.</div>
    `;
  }

  // Show last 6 weeks max
  const showPoints = points.slice(-6);

  // Calculate trend (current vs previous)
  let trendHtml = '';
  if (points.length >= 2) {
    const last = points[points.length - 1].value;
    const prev = points[points.length - 2].value;
    const diff = last - prev;
    if (diff > 0) {
      trendHtml = `<span class="weight-trend up">↑ +${diff.toFixed(diff % 1 === 0 ? 0 : 1)} ${metric.unit}</span>`;
    } else if (diff < 0) {
      trendHtml = `<span class="weight-trend down">↓ ${diff.toFixed(diff % 1 === 0 ? 0 : 1)} ${metric.unit}</span>`;
    } else {
      trendHtml = `<span class="weight-trend same">= mismo</span>`;
    }
  }

  const chips = showPoints.map(p => {
    const isCurrent = p.week === state.week;
    const cls = isCurrent ? 'weight-chip current' : 'weight-chip';
    return `<span class="${cls}"><span class="week-tag">S${p.week}</span>${p.value}${metric.unit}</span>`;
  }).join('');

  return `
    <div class="weight-history-header">
      <span class="weight-history-label">Evolución (${points.length} ${points.length === 1 ? 'semana' : 'semanas'})</span>
      ${trendHtml}
    </div>
    <div class="weight-chips">${chips}</div>
  `;
}

function saveWeight(exId, value, metricKey) {
  const ex = findExercise(exId);
  if (!ex) return;
  // If metricKey not provided, use primary metric (backwards compat)
  if (!metricKey) {
    metricKey = getPrimaryMetric(ex).key;
  }
  const num = parseFloat(value);

  if (!state.weights[exId]) state.weights[exId] = {};
  if (!state.weights[exId][state.week]) state.weights[exId][state.week] = {};

  if (value === '' || isNaN(num) || num <= 0) {
    delete state.weights[exId][state.week][metricKey];
    if (Object.keys(state.weights[exId][state.week]).length === 0) {
      delete state.weights[exId][state.week];
    }
  } else {
    state.weights[exId][state.week][metricKey] = num;
  }

  saveState();

  // Update history in the expanded panel without full re-render
  const card = document.querySelector(`[data-id="${exId}"]`);
  if (card) {
    const histDiv = card.querySelector('.weight-history');
    if (histDiv) histDiv.innerHTML = renderWeightHistory(exId);
  }
}

function toggleDone(id) {
  state.completed[id] = !state.completed[id];
  saveState();

  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) {
    if (state.completed[id]) {
      card.classList.add('done');
      if (navigator.vibrate) navigator.vibrate(15);
    } else {
      card.classList.remove('done');
    }
  }

  updateProgress();
  updateTabDots();
  checkDayComplete();
}

function updateProgress() {
  if (currentDay === 'body' || currentDay === 'evo') return;
  const day = WORKOUT[currentDay];
  const total = day.exercises.length;
  const done = day.exercises.filter(ex => state.completed[ex.id]).length;
  const pct = total ? (done / total) * 100 : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done}/${total}`;
}

function updateTabDots() {
  document.querySelectorAll('.tab').forEach(tab => {
    const dayId = tab.dataset.day;
    if (dayId === 'body' || dayId === 'evo') return;
    const day = WORKOUT[dayId];
    const allDone = day.exercises.every(ex => state.completed[ex.id]);
    tab.classList.toggle('complete', allDone);
  });
}

const BODY_METRICS = [
  { key: 'weight', label: 'Peso', unit: 'kg', color: '#d4ff3d', goodDir: 'down' },
  { key: 'fat', label: '% Grasa', unit: '%', color: '#f59e0b', goodDir: 'down' },
  { key: 'muscle', label: '% Músculo', unit: '%', color: '#22c55e', goodDir: 'up' },
  { key: 'water', label: '% Agua', unit: '%', color: '#60a5fa', goodDir: 'up' }
];

function renderBodyView() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.className = 'day-content active body-view';

  const bc = (state.bodyComp || {})[state.week] || {};

  let html = `
    <div class="day-title">COMPOSICIÓN CORPORAL</div>
    <div class="day-focus">Datos semanales · Feelfit</div>
    <div class="bc-info">
      Una vez por semana, mete aquí los datos de tu báscula <strong>Feelfit</strong>. Verás la evolución gráfica de cada métrica.
    </div>
    <div class="bc-week-label">Semana ${state.week} · esta semana</div>
    <div class="bc-grid">
  `;

  BODY_METRICS.forEach(m => {
    const value = bc[m.key] != null ? bc[m.key] : '';
    html += `
      <div class="bc-input-row" style="--mc:${m.color}">
        <div class="bc-label">${m.label}</div>
        <label class="bc-input-wrap" onclick="event.stopPropagation()">
          <input class="bc-input" type="number" inputmode="decimal" step="0.1" min="0" placeholder="—" value="${value}" data-metric="${m.key}">
          <span class="bc-unit">${m.unit}</span>
        </label>
      </div>
    `;
  });

  html += `</div><div class="bc-charts">`;

  BODY_METRICS.forEach(m => {
    html += renderMetricCard(m);
  });

  html += `</div>`;

  wrapper.innerHTML = html;
  content.appendChild(wrapper);

  wrapper.querySelectorAll('.bc-input').forEach(input => {
    input.addEventListener('change', e => saveBodyMetric(e.target.dataset.metric, e.target.value));
    input.addEventListener('blur', e => saveBodyMetric(e.target.dataset.metric, e.target.value));
  });
}

function renderMetricCard(m) {
  const data = getBodyHistoryData(m);
  return `
    <div class="bc-chart-card" data-metric="${m.key}" style="--mc:${m.color}">
      <div class="bc-chart-header">
        <span class="bc-chart-label">${m.label}</span>
        <span class="bc-chart-trend">${data.trendHtml}</span>
      </div>
      <div class="bc-chart-body">${data.chartHtml}</div>
      <div class="bc-chart-footer">${data.summaryHtml}</div>
    </div>
  `;
}

function getBodyHistoryData(m) {
  const bc = state.bodyComp || {};
  const allWeeks = Object.keys(bc).map(Number).sort((a,b) => a - b);
  const points = allWeeks
    .map(w => ({ week: w, value: bc[w]?.[m.key] }))
    .filter(p => p.value != null && !isNaN(p.value));

  if (points.length === 0) {
    return {
      trendHtml: '',
      chartHtml: '<div class="bc-empty">Sin datos · empieza arriba</div>',
      summaryHtml: '<span class="bc-mute">Mete tus datos para ver la evolución</span>'
    };
  }

  // Trend
  let trendHtml = '';
  if (points.length >= 2) {
    const last = points[points.length - 1].value;
    const prev = points[points.length - 2].value;
    const diff = +(last - prev).toFixed(1);
    let cls = 'same';
    if (diff !== 0) {
      const isGood = (diff > 0 && m.goodDir === 'up') || (diff < 0 && m.goodDir === 'down');
      cls = isGood ? 'good' : 'bad';
    }
    const sign = diff > 0 ? '+' : '';
    trendHtml = `<span class="bc-trend ${cls}">${sign}${diff} ${m.unit}</span>`;
  }

  // Chart
  const values = points.map(p => p.value);
  const chartHtml = renderSparkline(values, m.color);

  // Summary
  const current = points[points.length - 1].value;
  const min = Math.min(...values);
  const max = Math.max(...values);
  const summaryHtml = `
    <div><span class="bc-current">${current}</span><span class="bc-current-unit">${m.unit}</span></div>
    <div class="bc-mute">${points.length} ${points.length === 1 ? 'semana' : 'semanas'} · min ${min} · max ${max}</div>
  `;

  return { trendHtml, chartHtml, summaryHtml };
}

function renderSparkline(values, color) {
  const w = 320, h = 80, pad = 8;
  if (values.length === 1) {
    // Single point — show as horizontal line + dot
    const cx = w / 2, cy = h / 2;
    return `<svg class="bc-chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <line x1="${pad}" y1="${cy}" x2="${w-pad}" y2="${cy}" stroke="${color}" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.4"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="${color}"/>
      <circle cx="${cx}" cy="${cy}" r="9" fill="${color}" opacity="0.2"/>
    </svg>`;
  }
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const xStep = (w - pad*2) / (values.length - 1);

  const points = values.map((v, i) => {
    const x = pad + i * xStep;
    const y = h - pad - ((v - min) / range) * (h - pad*2);
    return [x, y];
  });

  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const lastPt = points[points.length - 1];
  const fillPath = `${linePath} L ${lastPt[0].toFixed(1)},${h-pad} L ${pad},${h-pad} Z`;

  const dots = points.map((p, i) => {
    const isLast = i === points.length - 1;
    return `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${isLast ? 4 : 2.5}" fill="${color}"/>`;
  }).join('');

  return `<svg class="bc-chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${fillPath}" fill="${color}" opacity="0.12"/>
    <path d="${linePath}" stroke="${color}" stroke-width="2" fill="none" stroke-linejoin="round"/>
    ${dots}
    <circle cx="${lastPt[0].toFixed(1)}" cy="${lastPt[1].toFixed(1)}" r="8" fill="${color}" opacity="0.25"/>
  </svg>`;
}

function saveBodyMetric(metric, value) {
  const num = parseFloat(value);
  if (!state.bodyComp) state.bodyComp = {};
  if (!state.bodyComp[state.week]) state.bodyComp[state.week] = {};

  if (value === '' || isNaN(num) || num <= 0) {
    delete state.bodyComp[state.week][metric];
    if (Object.keys(state.bodyComp[state.week]).length === 0) {
      delete state.bodyComp[state.week];
    }
  } else {
    state.bodyComp[state.week][metric] = num;
  }
  saveState();

  // Update only this metric's chart card (preserves input focus)
  const card = document.querySelector(`.bc-chart-card[data-metric="${metric}"]`);
  if (card) {
    const m = BODY_METRICS.find(x => x.key === metric);
    const data = getBodyHistoryData(m);
    card.querySelector('.bc-chart-trend').innerHTML = data.trendHtml;
    card.querySelector('.bc-chart-body').innerHTML = data.chartHtml;
    card.querySelector('.bc-chart-footer').innerHTML = data.summaryHtml;
  }
}

const ZONES = [
  { id: 'espalda', label: 'ESPALDA', color: '#d4ff3d' },
  { id: 'hombros', label: 'HOMBROS', color: '#60a5fa' },
  { id: 'pecho', label: 'PECHO', color: '#f59e0b' },
  { id: 'biceps', label: 'BÍCEPS', color: '#22c55e' },
  { id: 'triceps', label: 'TRÍCEPS', color: '#ef4444' },
  { id: 'piernas', label: 'PIERNAS', color: '#a78bfa' },
  { id: 'core', label: 'CORE', color: '#06b6d4' },
  { id: 'cardio', label: 'CARDIO', color: '#ec4899' }
];

let expandedZones = new Set();

function getExercisesForZone(zoneId) {
  const all = [];
  Object.entries(WORKOUT).forEach(([dayNum, day]) => {
    day.exercises.forEach(ex => {
      if (ex.zone === zoneId) {
        all.push({ ...ex, dayNum: parseInt(dayNum) });
      }
    });
  });
  // Mark duplicates with day suffix
  const nameCount = {};
  all.forEach(ex => { nameCount[ex.name] = (nameCount[ex.name] || 0) + 1; });
  all.forEach(ex => {
    ex.displayName = nameCount[ex.name] > 1 ? `${ex.name} · D${ex.dayNum}` : ex.name;
  });
  return all;
}

function renderEvolutionView() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.className = 'day-content active evo-view';

  let html = `
    <div class="day-title">EVOLUCIÓN POR ZONA</div>
    <div class="day-focus">Progresión semanal de cada ejercicio</div>
    <div class="bc-info">Toca cada zona para ver la evolución de los pesos. Los datos vienen automáticamente de lo que registras en cada día.</div>
  `;

  ZONES.forEach(z => {
    const exercises = getExercisesForZone(z.id);
    if (exercises.length === 0) return;
    const expanded = expandedZones.has(z.id);
    const tracked = exercises.filter(ex => {
      const exData = state.weights[ex.id] || {};
      return Object.keys(exData).length > 0;
    }).length;

    html += `
      <div class="evo-zone${expanded ? ' expanded' : ''}" data-zone="${z.id}" style="--zc:${z.color}">
        <div class="evo-zone-header">
          <span class="evo-zone-bar"></span>
          <span class="evo-zone-label">${z.label}</span>
          <span class="evo-zone-count">${exercises.length} ej${tracked > 0 ? ` · ${tracked} con datos` : ''}</span>
          <span class="evo-zone-toggle">▾</span>
        </div>
        <div class="evo-zone-body">
          ${exercises.map(ex => renderExerciseEvo(ex, z.color)).join('')}
        </div>
      </div>
    `;
  });

  wrapper.innerHTML = html;
  content.appendChild(wrapper);

  wrapper.querySelectorAll('.evo-zone-header').forEach(header => {
    header.addEventListener('click', () => {
      const zone = header.parentElement.dataset.zone;
      if (expandedZones.has(zone)) expandedZones.delete(zone);
      else expandedZones.add(zone);
      renderEvolutionView();
    });
  });
}

function renderExerciseEvo(ex, color) {
  const metric = getPrimaryMetric(ex);
  const exData = state.weights[ex.id] || {};
  const weeks = Object.keys(exData).map(Number).sort((a,b) => a-b);
  const points = weeks
    .map(w => ({ week: w, value: exData[w]?.[metric.key] }))
    .filter(p => p.value != null);

  let chartHtml, summaryHtml;

  if (points.length === 0) {
    chartHtml = '<div class="evo-empty">Sin datos · registra peso en el día correspondiente</div>';
    summaryHtml = '';
  } else {
    chartHtml = renderSparkline(points.map(p => p.value), color);
    const current = points[points.length - 1].value;
    let trendHtml = '';
    if (points.length >= 2) {
      const last = points[points.length-1].value;
      const prev = points[points.length-2].value;
      const diff = +(last - prev).toFixed(1);
      const sign = diff > 0 ? '+' : '';
      const cls = diff > 0 ? 'good' : (diff < 0 ? 'bad' : 'same');
      trendHtml = `<span class="evo-trend ${cls}">${sign}${diff}${metric.unit}</span>`;
    }
    summaryHtml = `<span class="evo-current" style="color:${color}">${current}<span class="evo-current-unit">${metric.unit}</span></span> ${trendHtml} <span class="bc-mute">${points.length}sem</span>`;
  }

  const priorityBadge = ex.priority ? '<span class="priority-star">TOP</span>' : '';

  return `
    <div class="evo-ex">
      <div class="evo-ex-name">${priorityBadge}${ex.displayName}</div>
      <div class="evo-ex-chart">${chartHtml}</div>
      ${summaryHtml ? `<div class="evo-ex-summary">${summaryHtml}</div>` : ''}
    </div>
  `;
}

// === EXERCISE IMAGE UPLOAD ===

function renderExpandedImage(ex) {
  const userImg = (state.exerciseImages || {})[ex.id];
  if (userImg) {
    return `
      <img class="expanded-user-img" src="${userImg}" alt="${ex.name}">
      <button class="img-remove-btn" data-ex-id="${ex.id}" aria-label="Quitar imagen">✕</button>
      <span class="img-user-badge">TU IMAGEN</span>
    `;
  }
  const svg = SVGS[EXERCISE_SVGS[ex.id]] || `<div class="expanded-fallback"><div class="big-emoji">${ex.emoji}</div><div class="label">${ex.name}</div></div>`;
  return `
    ${svg}
    <button class="img-upload-btn" data-ex-id="${ex.id}">+ Subir mi imagen</button>
  `;
}

function attachImageHandlers(card) {
  const uploadBtn = card.querySelector('.img-upload-btn');
  if (uploadBtn) {
    uploadBtn.addEventListener('click', e => {
      e.stopPropagation();
      uploadExerciseImage(uploadBtn.dataset.exId);
    });
  }
  const removeBtn = card.querySelector('.img-remove-btn');
  if (removeBtn) {
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('¿Quitar la imagen subida?')) {
        removeExerciseImage(removeBtn.dataset.exId);
      }
    });
  }
}

async function uploadExerciseImage(exId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.style.display = 'none';
  document.body.appendChild(input);
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) { input.remove(); return; }
    try {
      const base64 = await resizeImageToBase64(file);
      if (!state.exerciseImages) state.exerciseImages = {};
      state.exerciseImages[exId] = base64;
      try {
        saveState();
      } catch (storageErr) {
        delete state.exerciseImages[exId];
        alert('No hay espacio. Borra alguna imagen subida o reduce su tamaño.');
        input.remove();
        return;
      }
      refreshExerciseImage(exId);
    } catch(err) {
      alert('Error al cargar imagen: ' + err.message);
    }
    input.remove();
  };
  input.click();
}

async function resizeImageToBase64(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        const maxDim = 900;
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = Math.min(maxDim/width, maxDim/height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.78));
      } catch (e) { reject(e); }
      finally { URL.revokeObjectURL(objectUrl); }
    };
    img.onerror = () => {
      URL.revokeObjectURL(objectUrl);
      reject(new Error('Imagen no válida'));
    };
    img.src = objectUrl;
  });
}

function removeExerciseImage(exId) {
  if (state.exerciseImages) delete state.exerciseImages[exId];
  saveState();
  refreshExerciseImage(exId);
}

function refreshExerciseImage(exId) {
  const card = document.querySelector(`.exercise[data-id="${exId}"]`);
  if (!card) return;
  const wrap = card.querySelector('.expanded-image-wrap');
  if (wrap) {
    const ex = findExercise(exId);
    wrap.innerHTML = renderExpandedImage(ex);
    attachImageHandlers(card);
  }
}

function checkDayComplete() {
  const day = WORKOUT[currentDay];
  const allDone = day.exercises.every(ex => state.completed[ex.id]);
  const celebrationKey = `w${state.week}d${currentDay}`;

  if (allDone && !state.lastCelebrated[celebrationKey]) {
    state.lastCelebrated[celebrationKey] = true;
    saveState();
    setTimeout(() => {
      document.getElementById('celebration').classList.add('show');
    }, 400);
  }
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
}

function switchDay(day) {
  if (day === 'body' || day === 'evo') {
    currentDay = day;
  } else {
    currentDay = parseInt(day);
  }
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.day == day);
  });
  render();
}

function resetDay() {
  const day = WORKOUT[currentDay];
  day.exercises.forEach(ex => { delete state.completed[ex.id]; });
  delete state.lastCelebrated[`w${state.week}d${currentDay}`];
  saveState();
  render();
}

function newWeek() {
  state.week += 1;
  state.completed = {};
  state.lastCelebrated = {};
  saveState();
  render();
}

let modalAction = null;

function openModal(title, text, action) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text;
  modalAction = action;
  document.getElementById('resetModal').classList.add('show');
}

function closeModal() {
  document.getElementById('resetModal').classList.remove('show');
  modalAction = null;
}

document.getElementById('modalConfirm').addEventListener('click', () => {
  if (modalAction) modalAction();
  closeModal();
});

document.getElementById('resetDayBtn').addEventListener('click', () => {
  openModal('¿Resetear este día?', 'Se desmarcarán todos los ejercicios del día actual.', resetDay);
});

document.getElementById('newWeekBtn').addEventListener('click', () => {
  openModal('¿Empezar nueva semana?', `Pasarás a la semana ${state.week + 1}. Se reiniciarán todos los checks.`, newWeek);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchDay(tab.dataset.day));
});

render();
</script>
